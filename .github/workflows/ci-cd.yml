name: Node.js REST API CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  IMAGE_NAME: node-rest-api-cicd

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript
        run: npm run lint

      - name: Run automated tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Build Docker image
        run: docker build --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Deploy to Render
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing RENDER_DEPLOY_HOOK_URL secret."
            exit 1
          fi

          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
